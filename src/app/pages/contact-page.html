<section class="contact-hero">
  <div class="container">
    <div class="section-tag">04 — Contact</div>
    <h1>Travaillons <span class="gradient-text">ensemble</span></h1>
    <p class="contact-intro">Vous avez un projet, une opportunité de stage ou simplement envie d'échanger ? N'hésitez pas.</p>
  </div>
</section>

<section class="contact-body">
  <div class="container">
    <div class="contact-layout">
      <form class="contact-form glass" (ngSubmit)="onSubmit()" #f="ngForm">
        <div class="form-group">
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" [(ngModel)]="form.name" placeholder="Votre nom" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="form.email" placeholder="votre&#64;email.com" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" [(ngModel)]="form.message" rows="5" placeholder="Votre message..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full" [class.sent]="submitted()">
          {{ submitted() ? 'Message envoyé ✓' : 'Envoyer le message' }}
        </button>
      </form>

      <div class="contact-links">
        <a href="mailto:thanhlongle2704@gmail.com" class="contact-link glass">
          <span class="contact-link-icon">✉</span>
          <div><span class="contact-link-label">Email</span><span class="contact-link-value">thanhlongle2704&#64;gmail.com</span></div>
        </a>
        <a href="https://github.com/ThanosVN27" target="_blank" class="contact-link glass">
          <span class="contact-link-icon">◆</span>
          <div><span class="contact-link-label">GitHub</span><span class="contact-link-value">github.com/ThanosVN27</span></div>
        </a>
        <a href="https://linkedin.com/in/votre-profil" target="_blank" class="contact-link glass">
          <span class="contact-link-icon">◇</span>
          <div><span class="contact-link-label">LinkedIn</span><span class="contact-link-value">linkedin.com/in/votre-profil</span></div>
        </a>
        <a href="CV_Le-ThanhLong.pdf" download class="contact-link glass">
          <span class="contact-link-icon">📄</span>
          <div><span class="contact-link-label">CV</span><span class="contact-link-value">Télécharger mon CV</span></div>
        </a>
      </div>
    </div>
  </div>
</section>
